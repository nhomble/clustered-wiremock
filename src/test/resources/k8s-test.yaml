# Applied by ClusteredWireMockK8sIT into an in-container k3s cluster. Mirrors k8s/clustered-wiremock.yaml
# but uses a preloaded local image (imagePullPolicy: Never) and 2 replicas. IMAGE_PLACEHOLDER is
# substituted by the test.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: wiremock
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wiremock-hazelcast-discovery
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["endpoints", "pods", "services"]
    verbs: ["get", "list"]
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wiremock-hazelcast-discovery
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wiremock-hazelcast-discovery
subjects:
  - kind: ServiceAccount
    name: wiremock
    namespace: default
---
apiVersion: v1
kind: Service
metadata:
  name: wiremock-hazelcast
  namespace: default
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app: wiremock
  ports:
    - name: hazelcast
      port: 5701
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiremock
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wiremock
  template:
    metadata:
      labels:
        app: wiremock
    spec:
      serviceAccountName: wiremock
      containers:
        - name: wiremock
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
            - name: hazelcast
              containerPort: 5701
          env:
            - name: WIREMOCK_CLUSTER_K8S_SERVICE_NAME
              value: wiremock-hazelcast
          readinessProbe:
            httpGet:
              path: /__admin/mappings
              port: 8080
            periodSeconds: 3
