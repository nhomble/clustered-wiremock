# Two distinct WireMock services clustered by the extension. The image is built from the Dockerfile,
# which pulls the extension jar from Maven Central — no local build needed.
#
#   docker compose up
#
# Both auto-load the extension (ServiceLoader), join one Hazelcast cluster over TCP/IP, replicate
# stubs into each other's native store, and serve the shared journal at GET /__admin/cluster/requests.
#
#   curl -X POST localhost:8081/__admin/mappings \
#     -d '{"request":{"method":"GET","url":"/hi"},"response":{"status":200,"body":"hi"}}'
#   curl localhost:8082/hi                       # served by node-b -> "hi"
#   curl localhost:8082/__admin/cluster/requests # node-b sees node-a's traffic too

x-wiremock: &wiremock
  image: clustered-wiremock:local
  build: .
  environment:
    # Both peers, by service name, resolved on the compose network for Hazelcast TCP/IP discovery.
    WIREMOCK_CLUSTER_MEMBERS: "node-a,node-b"

services:
  node-a:
    <<: *wiremock
    ports:
      - "8081:8080"

  node-b:
    <<: *wiremock
    ports:
      - "8082:8080"
