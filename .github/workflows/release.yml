name: Release

# Push a version tag to release, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# The released artifact version is taken from the tag (v0.1.0 -> 0.1.0); main stays -SNAPSHOT.
#
# Required repo secrets:
#   GPG_PRIVATE_KEY         `gpg --armor --export-secret-keys <KEYID>`
#   MAVEN_GPG_PASSPHRASE    the key's passphrase
#   CENTRAL_TOKEN_USERNAME  Sonatype Central user-token username
#   CENTRAL_TOKEN_PASSWORD  Sonatype Central user-token password
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest # Docker daemon for the Testcontainers gate + deploy
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21 (+ GPG import + settings.xml for Central)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Set release version from tag
        run: mvn -B --no-transfer-progress versions:set -DnewVersion=${GITHUB_REF_NAME#v} -DgenerateBackupPoms=false

      - name: Build, test, sign, deploy to Central
        run: mvn -B --no-transfer-progress -Prelease deploy
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
